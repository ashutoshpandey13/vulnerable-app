apiVersion: apps/v1
kind: Deployment

metadata:
  name: vulnerable-nginx

spec:
  replicas: 1

  selector:
    matchLabels:
      app: vulnerable-nginx

  template:
    metadata:
      labels:
        app: vulnerable-nginx

    spec:
      containers:
      - name: nginx
        image: nginx:latest

        securityContext:
          privileged: true
          runAsUser: 0

        ports:
        - containerPort: 80
